 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
 </head>
 <body>
     <div class="container">
          <div class="product-card">
            <div class="main">
                <div class="img">
                    <img src="Shoe-image.jpg" alt="shoe-img">
                </div>
            </div>

            <div class="section">
              <div class="options">
                    <div class="opt-img">
                        <img src="shoe2-image.jpg" alt="shoe-img">
                        <img src="Shoe-img.jpg" alt="shoe-img">
                        <img src="Shoe4-img.jpg" alt="shoe-img">
                    </div>
                </div>
                <div class="info">
                 <h3>Nike Air Max 270</h3>
                 <p>Mens Wear</p>
                </div>
    
                <div class="price">
                    <p>$139.99</p>
                    <p class="cut-price" >$169.99</p>
                </div>
    
                <div class="buttons">
                    <button class="cart-btn">🛒 ADD TO CART</button>
                    <button class="wishlist-btn">❤️</button>
                </div>
            </div>
          </div>
     </div>
 </body>
 </html>
